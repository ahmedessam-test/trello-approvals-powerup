<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    :root {
      --bg: #161b22;
      --surface: #1d2329;
      --surface2: #22292f;
      --surface3: #272e36;
      --border: #30373f;
      --text: #b6c2cf;
      --text-strong: #e8edf2;
      --text-muted: #7c8da3;
      --green: #4bce97;
      --green-dim: rgba(75,206,151,0.1);
      --red: #f87168;
      --red-dim: rgba(248,113,104,0.1);
      --yellow: #f5cd47;
      --yellow-dim: rgba(245,205,71,0.1);
      --blue: #579dff;
      --blue-dim: rgba(87,157,255,0.1);
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: var(--blue);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .brand-name {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.02em;
    }
    .brand-sub { font-size: 11px; color: var(--text-muted); }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.total::before { background: var(--blue); }
    .stat-card.pending::before { background: var(--yellow); }
    .stat-card.approved::before { background: var(--green); }
    .stat-card.declined::before { background: var(--red); }

    .stat-num {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-strong);
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card.total .stat-num { color: var(--blue); }
    .stat-card.pending .stat-num { color: var(--yellow); }
    .stat-card.approved .stat-num { color: var(--green); }
    .stat-card.declined .stat-num { color: var(--red); }
    .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 2px;
    }
    .tab {
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Content ── */
    .content { padding: 20px 24px; }

    /* Bulk section */
    .bulk-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      overflow: hidden;
    }
    .bulk-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .bulk-header:hover { background: var(--surface2); }
    .bulk-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bulk-icon {
      width: 30px;
      height: 30px;
      background: var(--blue-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue);
      font-size: 14px;
    }
    .bulk-title-text { font-size: 14px; font-weight: 700; color: var(--text-strong); }
    .bulk-sub { font-size: 11px; color: var(--text-muted); }
    .bulk-toggle { color: var(--text-muted); font-size: 12px; }

    .bulk-body {
      padding: 0 18px 18px;
      display: none;
      border-top: 1px solid var(--border);
    }
    .bulk-body.open { display: block; }

    .bulk-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin: 12px 0 8px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 6px;
      border-left: 3px solid var(--blue);
    }
    .bulk-hint code {
      font-family: monospace;
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--blue);
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-strong);
      font-family: 'DM Mono', 'Fira Code', monospace;
      font-size: 12px;
      padding: 10px 12px;
      min-height: 90px;
      resize: vertical;
      outline: none;
      margin-bottom: 10px;
      transition: border-color 0.15s;
      line-height: 1.6;
    }
    textarea:focus { border-color: var(--blue); }
    textarea::placeholder { color: var(--text-muted); }

    .bulk-actions { display: flex; gap: 8px; align-items: center; }

    .run-btn {
      padding: 8px 18px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; flex: 1; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }

    .bulk-log {
      margin-top: 10px;
      background: #0d1117;
      border-radius: 6px;
      padding: 12px;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      line-height: 2;
      max-height: 140px;
      overflow-y: auto;
      display: none;
      border: 1px solid var(--border);
    }
    .bulk-log.open { display: block; }
    .bulk-log::-webkit-scrollbar { width: 4px; }
    .bulk-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-ok { color: var(--green); }
    .log-err { color: var(--red); }
    .log-info { color: var(--text-muted); }

    /* ── Card list ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .card-grid { display: flex; flex-direction: column; gap: 8px; }

    .card-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .card-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .card-item.status-pending::before { background: var(--yellow); }
    .card-item.status-approved::before { background: var(--green); }
    .card-item.status-declined::before { background: var(--red); }
    .card-item.status-empty::before { background: var(--border); }

    .card-item:hover {
      background: var(--surface2);
      border-color: rgba(87,157,255,0.3);
      transform: translateX(2px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text-strong);
      line-height: 1.3;
      flex: 1;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .pill-pending { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,205,71,0.2); }
    .pill-approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.2); }
    .pill-declined { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,104,0.2); }
    .pill-empty { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .approver-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .chip-pending { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .chip-approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.2); }
    .chip-declined { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,104,0.2); }

    .chip-av {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      font-weight: 800;
      color: #fff;
    }

    /* Progress bar on card */
    .card-progress {
      margin-top: 10px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .card-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .empty-emoji { font-size: 36px; margin-bottom: 12px; }
    .empty-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty-desc { font-size: 12px; }

    .loading { padding: 40px; text-align: center; color: var(--text-muted); }

    /* Refresh btn */
    .refresh-btn {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--border); color: var(--text-strong); }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-item { animation: fadeUp 0.2s ease both; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="brand-icon">✦</div>
      <div>
        <div class="brand-name">Approvals</div>
        <div class="brand-sub">Change Management Dashboard</div>
      </div>
    </div>
    <button class="refresh-btn" onclick="init()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8 2l2-2M8 2l2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>

  <div class="stats-row">
    <div class="stat-card total">
      <div class="stat-num" id="sTotal">—</div>
      <div class="stat-label">With Approvers</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-num" id="sPending">—</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card approved">
      <div class="stat-num" id="sApproved">—</div>
      <div class="stat-label">Approved</div>
    </div>
    <div class="stat-card declined">
      <div class="stat-num" id="sDeclined">—</div>
      <div class="stat-label">Declined</div>
    </div>
  </div>

  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all',this)">All Cards</button>
    <button class="tab" onclick="setFilter('pending',this)">Pending</button>
    <button class="tab" onclick="setFilter('approved',this)">Approved</button>
    <button class="tab" onclick="setFilter('declined',this)">Declined</button>
    <button class="tab" onclick="setFilter('empty',this)">No Approvers</button>
  </div>
</div>

<div class="content">

  <!-- Bulk Panel -->
  <div class="bulk-panel">
    <div class="bulk-header" onclick="toggleBulk()">
      <div class="bulk-header-left">
        <div class="bulk-icon">⚡</div>
        <div>
          <div class="bulk-title-text">Bulk Set Approvers</div>
          <div class="bulk-sub">Set approvers on multiple cards at once using CSV</div>
        </div>
      </div>
      <span class="bulk-toggle" id="bulkArrow">▼</span>
    </div>
    <div class="bulk-body" id="bulkBody">
      <div class="bulk-hint">
        Format: <code>card_short_id, member_id_1, member_id_2, member_id_3</code> — one card per line
      </div>
      <textarea id="bulkCsv" placeholder="MQ9AAcak,68871e9d8e385696213e6a11,646b127449ddc15f6f1da60e,60602b17b1be5e4d747aac3b&#10;03toJvh3,68871e9d8e385696213e6a11,646b127449ddc15f6f1da60e,60602b17b1be5e4d747aac3b"></textarea>
      <div class="bulk-actions">
        <button class="run-btn" id="runBtn" onclick="runBulk()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>
          Run Injection
        </button>
        <div class="progress-bar" id="progressBar" style="display:none">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
      <div class="bulk-log" id="bulkLog"></div>
    </div>
  </div>

  <div class="section-title" id="sectionTitle">All Cards</div>
  <div class="card-grid" id="cardGrid"><div class="loading">Loading cards…</div></div>
</div>

<script>
  var t = window.TrelloPowerUp.iframe({
    appKey: 'd6dfdf9018fc698338d812f344d5c863',
    appName: 'Change Approvals'
  });

  var COLORS = ['#0747a6','#006644','#ae2e24','#974f0c','#5e4db2','#026e8f','#206a83','#a54800'];
  var allCards = [], memberMap = {}, currentFilter = 'all';

  function initials(name) {
    return (name||'??').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  }
  function avatarColor(id) {
    var h=0; for(var i=0;i<id.length;i++) h=id.charCodeAt(i)+((h<<5)-h);
    return COLORS[Math.abs(h)%COLORS.length];
  }
  function delay(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

  function getStatus(item) {
    var d = item.data;
    if (!d || !d.idReviewers || !d.idReviewers.length) return 'empty';
    var reviews = d.reviews || {};
    var total = d.idReviewers.length;
    var approved = d.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='approved'; }).length;
    var declined = d.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='declined'; }).length;
    if (declined > 0) return 'declined';
    if (approved === total) return 'approved';
    return 'pending';
  }

  async function init() {
    document.getElementById('cardGrid').innerHTML = '<div class="loading">Loading cards…</div>';
    try {
      var board = await t.board('members','cards');
      board.members.forEach(function(m){ memberMap[m.id]=m; });
      var cards = board.cards;
      allCards = [];
      // Fetch plugin data for each card with small delay to avoid rate limiting
      for (var i=0; i<cards.length; i++) {
        try {
          var data = await t.get(cards[i].id,'shared','approvalData');
          // t.get returns undefined if no data — treat as null
          allCards.push({card:cards[i], data: data || null});
        } catch(e) {
          allCards.push({card:cards[i], data:null});
        }
        // Small delay every 10 cards to avoid hitting limits
        if (i > 0 && i % 10 === 0) await delay(100);
      }
      updateStats();
      renderCards();
    } catch(e) {
      document.getElementById('cardGrid').innerHTML = '<div class="loading">Error loading: '+e.message+'</div>';
    }
  }

  function updateStats() {
    var withApp = allCards.filter(function(c){ return c.data && c.data.idReviewers && c.data.idReviewers.length; });
    document.getElementById('sTotal').textContent = withApp.length;
    document.getElementById('sPending').textContent = withApp.filter(function(c){ return getStatus(c)==='pending'; }).length;
    document.getElementById('sApproved').textContent = withApp.filter(function(c){ return getStatus(c)==='approved'; }).length;
    document.getElementById('sDeclined').textContent = withApp.filter(function(c){ return getStatus(c)==='declined'; }).length;
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    renderCards();
  }

  function renderCards() {
    var filtered = allCards.filter(function(item){
      return currentFilter === 'all' || getStatus(item) === currentFilter;
    });

    document.getElementById('sectionTitle').textContent =
      currentFilter === 'all' ? 'All Cards ('+filtered.length+')' :
      currentFilter.charAt(0).toUpperCase()+currentFilter.slice(1)+' ('+filtered.length+')';

    if (!filtered.length) {
      document.getElementById('cardGrid').innerHTML =
        '<div class="empty-state">'+
          '<div class="empty-emoji">'+
            (currentFilter==='approved'?'✓':currentFilter==='declined'?'✕':currentFilter==='pending'?'◎':'○')+
          '</div>'+
          '<div class="empty-title">No cards here</div>'+
          '<div class="empty-desc">No cards match this filter</div>'+
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(item, idx) {
      var card = item.card;
      var data = item.data;
      var status = getStatus(item);
      var reviews = (data && data.reviews) || {};
      var idReviewers = (data && data.idReviewers) || [];
      var total = idReviewers.length;
      var approvedCount = idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='approved'; }).length;

      // Status pill
      var pillClass = 'pill-'+status;
      var pillIcon = status==='approved'?'✓ ':status==='declined'?'✕ ':status==='pending'?'◎ ':'';
      var pillText = status==='approved'?'Approved':status==='declined'?'Declined':status==='pending'?'Pending ('+approvedCount+'/'+total+')':'No Approvers';

      // Approver chips
      var chipsHtml = '';
      if (idReviewers.length) {
        idReviewers.forEach(function(id){
          var m = memberMap[id] || {fullName:'Unknown',id:id};
          var rStatus = reviews[id] ? reviews[id].status : 'pending';
          chipsHtml += '<div class="chip chip-'+rStatus+'">'+
            '<div class="chip-av" style="background:'+avatarColor(id)+'">'+initials(m.fullName)+'</div>'+
            m.fullName+
          '</div>';
        });
      } else {
        chipsHtml = '<span style="color:var(--text-muted);font-size:11px">No approvers assigned</span>';
      }

      // Progress
      var progressWidth = total > 0 ? Math.round((approvedCount/total)*100) : 0;
      var progressColor = status==='approved' ? 'var(--green)' : status==='declined' ? 'var(--red)' : 'var(--yellow)';

      html += '<div class="card-item status-'+status+'" onclick="openCard(\''+card.shortLink+'\')" style="animation-delay:'+(idx*0.04)+'s">'+
        '<div class="card-top">'+
          '<div class="card-name">'+card.name+'</div>'+
          '<span class="status-pill '+pillClass+'">'+pillIcon+pillText+'</span>'+
        '</div>'+
        '<div class="approver-chips">'+chipsHtml+'</div>'+
        (total > 0 ?
          '<div class="card-progress"><div class="card-progress-fill" style="width:'+progressWidth+'%;background:'+progressColor+'"></div></div>'
        : '')+
      '</div>';
    });

    document.getElementById('cardGrid').innerHTML = html;
  }

  function openCard(shortLink) {
    t.navigate({ url: 'https://trello.com/c/'+shortLink });
  }

  function toggleBulk() {
    var body = document.getElementById('bulkBody');
    var arrow = document.getElementById('bulkArrow');
    body.classList.toggle('open');
    arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
  }

  function bulkLog(msg, type) {
    var log = document.getElementById('bulkLog');
    log.classList.add('open');
    var d = document.createElement('div');
    d.className = 'log-'+(type||'info');
    d.textContent = '['+new Date().toLocaleTimeString()+'] '+msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  async function runBulk() {
    var raw = document.getElementById('bulkCsv').value.trim();
    if (!raw) { alert('Please enter CSV data'); return; }

    var rows = raw.split('\n')
      .map(function(l){ return l.trim(); })
      .filter(function(l){ return l && !l.startsWith('#'); })
      .map(function(l){
        var p = l.split(',').map(function(x){ return x.trim(); });
        return { cardId: p[0], approverIds: p.slice(1).filter(Boolean) };
      });

    if (!rows.length) { alert('No valid rows found'); return; }

    var btn = document.getElementById('runBtn');
    var bar = document.getElementById('progressBar');
    var fill = document.getElementById('progressFill');
    btn.disabled = true;
    btn.innerHTML = '<span style="display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin-right:6px"></span>Running…';
    bar.style.display = 'block';
    document.getElementById('bulkLog').innerHTML = '';

    bulkLog('Starting — '+rows.length+' card(s)', 'info');
    var ok=0, fail=0;

    for (var i=0; i<rows.length; i++) {
      var row = rows[i];
      fill.style.width = Math.round((i/rows.length)*100)+'%';
      try {
        await t.set(row.cardId, 'shared', 'approvalData', {
          reviews: {},
          idReviewers: row.approverIds,
          minimumApprovals: row.approverIds.length
        });
        bulkLog('✓ '+row.cardId, 'ok');
        ok++;
      } catch(e) {
        bulkLog('✗ '+row.cardId+': '+e.message, 'err');
        fail++;
      }
      await delay(150);
    }

    fill.style.width = '100%';
    bulkLog('─────────────────────────────', 'info');
    bulkLog('Done — '+ok+' succeeded, '+fail+' failed', ok>0&&fail===0?'ok':'err');

    btn.disabled = false;
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg> Run Again';

    await delay(1000);
    init();
  }

  // Add spin keyframe
  var style = document.createElement('style');
  style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
  document.head.appendChild(style);

  init();
</script>
</body>
</html>
