<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    :root {
      --bg: #161b22;
      --surface: #1d2329;
      --surface2: #22292f;
      --surface3: #272e36;
      --border: #30373f;
      --text: #b6c2cf;
      --text-strong: #e8edf2;
      --text-muted: #7c8da3;
      --green: #4bce97;
      --green-dim: rgba(75,206,151,0.1);
      --red: #f87168;
      --red-dim: rgba(248,113,104,0.1);
      --yellow: #f5cd47;
      --yellow-dim: rgba(245,205,71,0.1);
      --blue: #579dff;
      --blue-dim: rgba(87,157,255,0.1);
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--blue);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff;
    }
    .brand-name { font-size: 20px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.02em; }
    .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .member-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px; font-weight: 600; color: var(--text-strong);
    }
    .member-av {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #fff;
    }

    .refresh-btn {
      padding: 7px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 5px; transition: all 0.15s;
    }
    .refresh-btn:hover { background: var(--border); color: var(--text-strong); }

    /* ── Stats ── */
    .stats-row {
      display: grid; grid-template-columns: 1fr;
      gap: 12px; padding: 20px 24px 0;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .stat-card.pending::before { background: var(--yellow); }
    .stat-card.approved::before { background: var(--green); }
    .stat-card.total::before { background: var(--blue); }
    .stat-num { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 4px; letter-spacing: -0.03em; }
    .stat-card.pending .stat-num { color: var(--yellow); }
    .stat-card.approved .stat-num { color: var(--green); }
    .stat-card.total .stat-num { color: var(--blue); }
    .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 2px; padding: 16px 24px 0;
      border-bottom: 1px solid var(--border); margin: 0 0 0;
    }
    .tab {
      padding: 10px 16px; border: none; background: transparent;
      color: var(--text-muted); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── Content ── */
    .content { padding: 20px 24px; }

    /* Bulk panel */
    .bulk-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
    }
    .bulk-header {
      padding: 14px 18px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer; user-select: none;
    }
    .bulk-header:hover { background: var(--surface2); }
    .bulk-left { display: flex; align-items: center; gap: 10px; }
    .bulk-icon {
      width: 30px; height: 30px; background: var(--blue-dim);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: var(--blue); font-size: 14px;
    }
    .bulk-title { font-size: 14px; font-weight: 700; color: var(--text-strong); }
    .bulk-sub-text { font-size: 11px; color: var(--text-muted); }
    .bulk-body { padding: 0 18px 18px; display: none; border-top: 1px solid var(--border); }
    .bulk-body.open { display: block; }
    .bulk-hint {
      font-size: 11px; color: var(--text-muted); margin: 12px 0 8px;
      padding: 10px 12px; background: var(--surface2); border-radius: 6px;
      border-left: 3px solid var(--blue);
    }
    .bulk-hint code { font-family: monospace; background: rgba(255,255,255,0.06); padding: 1px 5px; border-radius: 3px; color: var(--blue); }
    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-strong); font-family: monospace;
      font-size: 12px; padding: 10px 12px; min-height: 80px; resize: vertical;
      outline: none; margin-bottom: 10px; transition: border-color 0.15s; line-height: 1.6;
    }
    textarea:focus { border-color: var(--blue); }
    .bulk-actions { display: flex; gap: 8px; align-items: center; }
    .run-btn {
      padding: 8px 18px; background: var(--blue); color: #fff; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s;
    }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .progress-bar { height: 3px; background: var(--border); border-radius: 2px; flex: 1; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s; }
    .bulk-log {
      margin-top: 10px; background: #0d1117; border-radius: 6px; padding: 12px;
      font-family: monospace; font-size: 11px; line-height: 2; max-height: 120px;
      overflow-y: auto; display: none; border: 1px solid var(--border);
    }
    .bulk-log.open { display: block; }
    .log-ok { color: var(--green); }
    .log-err { color: var(--red); }
    .log-info { color: var(--text-muted); }

    /* Card items */
    .section-label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 12px;
    }
    .card-grid { display: flex; flex-direction: column; gap: 8px; }

    .card-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden;
      transition: all 0.15s;
    }
    .card-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    }
    .card-item.pending::before { background: var(--yellow); }
    .card-item.approved::before { background: var(--green); }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px; margin-bottom: 12px;
    }
    .card-name {
      font-weight: 700; font-size: 14px; color: var(--text-strong);
      line-height: 1.3; flex: 1; cursor: pointer;
    }
    .card-name:hover { color: var(--blue); }

    .card-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .status-pending { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,205,71,0.2); }
    .status-approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.2); }

    /* All approvers progress */
    .all-approvers {
      display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .approver-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500;
    }
    .chip-pending { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .chip-approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.2); }
    .chip-declined { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,104,0.2); }
    .chip-av {
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; font-weight: 800; color: #fff;
    }

    /* Action buttons */
    .card-actions { display: flex; gap: 8px; align-items: center; }
    .action-btn {
      padding: 7px 16px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 700; cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; gap: 6px; transition: opacity 0.15s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-approve { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.3); }
    .btn-decline { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,104,0.3); }
    .btn-approved { background: var(--green); color: #fff; cursor: default; }
    .btn-open {
      padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--text-muted);
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn-open:hover { color: var(--text-strong); background: var(--border); }

    .progress-mini {
      height: 3px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden;
    }
    .progress-mini-fill { height: 100%; border-radius: 2px; background: var(--yellow); transition: width 0.3s; }
    .progress-mini-fill.full { background: var(--green); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 24px;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--text-strong); margin-bottom: 8px; }
    .empty-desc { font-size: 13px; color: var(--text-muted); }

    .loading { padding: 48px; text-align: center; color: var(--text-muted); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .card-item { animation: fadeUp 0.2s ease both; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand-icon">✦</div>
    <div>
      <div class="brand-name">Approvals Dashboard</div>
      <div class="brand-sub" id="boardName">Change Management</div>
    </div>
  </div>
  <div class="header-right">
    <div class="member-chip">
      <div class="member-av" id="memberAv" style="background:#0747a6">—</div>
      <span id="memberName">Loading…</span>
    </div>
    <button class="refresh-btn" onclick="init()">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
        <path d="M14 8A6 6 0 1 1 8 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M8 2l2-2M8 2l2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Refresh
    </button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-card pending">
    <div class="stat-num" id="sPending">—</div>
    <div class="stat-label">Pending My Approval</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('pending', this)">⏳ Pending My Approval</button>
  <button class="tab" onclick="setTab('bulk', this)">⚡ Bulk Set Approvers</button>
</div>

<div class="content">
  <div id="bulkPanel" style="display:none">
    <div class="bulk-panel">
      <div class="bulk-header" onclick="toggleBulk()">
        <div class="bulk-left">
          <div class="bulk-icon">⚡</div>
          <div>
            <div class="bulk-title">Bulk Set Approvers</div>
            <div class="bulk-sub-text">Set approvers on multiple cards at once using CSV</div>
          </div>
        </div>
        <span id="bulkArrow">▼</span>
      </div>
      <div class="bulk-body open" id="bulkBody">
        <div class="bulk-hint">
          Format: <code>card_short_id, member_id_1, member_id_2, member_id_3</code> — one card per line
        </div>
        <textarea id="bulkCsv" placeholder="MQ9AAcak,68871e9d8e385696213e6a11,646b127449ddc15f6f1da60e,60602b17b1be5e4d747aac3b"></textarea>
        <div class="bulk-actions">
          <button class="run-btn" id="runBtn" onclick="runBulk()">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l11 6-11 6V2z"/></svg>
            Run Injection
          </button>
          <div class="progress-bar" id="progressBar" style="display:none">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="bulk-log" id="bulkLog"></div>
      </div>
    </div>
  </div>

  <div id="mainPanel">
    <div class="section-label" id="sectionLabel">Pending My Approval</div>
    <div class="card-grid" id="cardGrid"><div class="loading"><span class="spinner"></span></div></div>
  </div>
</div>

<script>
  var t = window.TrelloPowerUp.iframe({
    appKey: 'd6dfdf9018fc698338d812f344d5c863',
    appName: 'Change Approvals'
  });

  var COLORS = ['#0747a6','#006644','#ae2e24','#974f0c','#5e4db2','#026e8f','#206a83','#a54800'];
  var allCards = [], memberMap = {}, currentMember = null, currentTab = 'pending';

  function initials(name) { return (name||'??').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase(); }
  function avatarColor(id) { var h=0; for(var i=0;i<id.length;i++) h=id.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }
  function delay(ms) { return new Promise(function(r){setTimeout(r,ms);}); }

  function getMyStatus(item) {
    if (!item.data || !item.data.idReviewers) return null;
    var isAssigned = item.data.idReviewers.indexOf(currentMember.id) !== -1;
    if (!isAssigned) return null;
    var reviews = item.data.reviews || {};
    var myReview = reviews[currentMember.id];
    return myReview ? myReview.status : 'pending';
  }

  function getOverallStatus(item) {
    if (!item.data || !item.data.idReviewers || !item.data.idReviewers.length) return 'empty';
    var reviews = item.data.reviews || {};
    var total = item.data.idReviewers.length;
    var approved = item.data.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='approved'; }).length;
    var declined = item.data.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='declined'; }).length;
    if (declined > 0) return 'declined';
    if (approved === total) return 'approved';
    return 'pending';
  }

  async function init() {
    document.getElementById('cardGrid').innerHTML = '<div class="loading"><span class="spinner"></span></div>';
    try {
      var board = await t.board('members');
      board.members.forEach(function(m){ memberMap[m.id]=m; });
      currentMember = await t.member('id','fullName','username');

      // Update member chip
      var avEl = document.getElementById('memberAv');
      var nameEl = document.getElementById('memberName');
      if (avEl) { avEl.textContent = initials(currentMember.fullName); avEl.style.background = avatarColor(currentMember.id); }
      if (nameEl) nameEl.textContent = currentMember.fullName;

      var cards = await t.cards('id','name','shortLink');
      allCards = [];

      for (var i=0; i<cards.length; i++) {
        try {
          var data = await t.get(cards[i].id,'shared','approvalData');
          allCards.push({card:cards[i], data: data||null});
        } catch(e) {
          allCards.push({card:cards[i], data:null});
        }
        if (i>0 && i%10===0) await delay(50);
      }

      updateStats();
      renderCards();
    } catch(e) {
      document.getElementById('cardGrid').innerHTML = '<div class="loading">Error: '+e.message+'</div>';
    }
  }

  function updateStats() {
    var myCards = allCards.filter(function(c){ return getMyStatus(c) !== null; });
    var pendingMine = myCards.filter(function(c){ return getMyStatus(c)==='pending'; });
    var el = document.getElementById('sPending');
    if (el) el.textContent = pendingMine.length;
  }

  function setTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');

    var bulkPanel = document.getElementById('bulkPanel');
    var mainPanel = document.getElementById('mainPanel');

    if (tab === 'bulk') {
      bulkPanel.style.display = 'block';
      mainPanel.style.display = 'none';
    } else {
      bulkPanel.style.display = 'none';
      mainPanel.style.display = 'block';
      renderCards();
    }
  }

  function renderCards() {
    var filtered;
    var label;

    if (currentTab === 'pending') {
      filtered = allCards.filter(function(c){ return getMyStatus(c)==='pending'; });
      label = 'Pending My Approval';
    } else if (currentTab === 'approved') {
      filtered = allCards.filter(function(c){ return getMyStatus(c)==='approved'; });
      label = "I've Approved";
    } else {
      filtered = allCards.filter(function(c){ return getMyStatus(c) !== null; });
      label = 'All Cards Assigned to Me';
    }

    document.getElementById('sectionLabel').textContent = label + ' (' + filtered.length + ')';

    if (!filtered.length) {
      var emptyMsg = currentTab === 'pending'
        ? { icon: '✓', title: "You're all caught up!", desc: 'No cards are pending your approval.' }
        : { icon: '○', title: 'Nothing here yet', desc: 'No cards match this filter.' };
      document.getElementById('cardGrid').innerHTML =
        '<div class="empty-state">'+
          '<div class="empty-icon">'+emptyMsg.icon+'</div>'+
          '<div class="empty-title">'+emptyMsg.title+'</div>'+
          '<div class="empty-desc">'+emptyMsg.desc+'</div>'+
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(item, idx) {
      var card = item.card;
      var data = item.data;
      var myStatus = getMyStatus(item);
      var reviews = (data && data.reviews) || {};
      var idReviewers = (data && data.idReviewers) || [];
      var total = idReviewers.length;
      var approvedCount = idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='approved'; }).length;
      var progressWidth = total > 0 ? Math.round((approvedCount/total)*100) : 0;

      // All approvers chips
      var chipsHtml = idReviewers.map(function(id){
        var m = memberMap[id] || {fullName:'Unknown', id:id};
        var rStatus = reviews[id] ? reviews[id].status : 'pending';
        return '<div class="approver-chip chip-'+rStatus+'">'+
          '<div class="chip-av" style="background:'+avatarColor(id)+'">'+initials(m.fullName)+'</div>'+
          m.fullName+
        '</div>';
      }).join('');

      // My action
      var actionHtml = '';
      if (myStatus === 'pending') {
        actionHtml =
          '<button class="action-btn btn-approve" onclick="doAction(\''+card.id+'\',\''+card.shortLink+'\',\'approved\',this)">'+
            '<svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            'Approve'+
          '</button>'+
          '<button class="action-btn btn-decline" onclick="doAction(\''+card.id+'\',\''+card.shortLink+'\',\'declined\',this)">'+
            '<svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>'+
            'Decline'+
          '</button>';
      } else if (myStatus === 'approved') {
        actionHtml = '<button class="action-btn btn-approved" disabled>✓ Approved</button>';
      } else {
        actionHtml = '<button class="action-btn btn-decline" disabled style="opacity:0.6">✕ Declined</button>';
      }

      html +=
        '<div class="card-item '+myStatus+'" id="card-'+card.id+'" style="animation-delay:'+(idx*0.04)+'s">'+
          '<div class="card-top">'+
            '<div class="card-name" onclick="openCard(\''+card.shortLink+'\')">'+card.name+'</div>'+
            '<span class="card-status status-'+myStatus+'">'+
              (myStatus==='approved'?'✓ Approved':'⏳ Pending')+
            '</span>'+
          '</div>'+
          '<div class="all-approvers">'+chipsHtml+'</div>'+
          '<div class="card-actions">'+
            actionHtml+
            '<button class="btn-open" onclick="openCard(\''+card.shortLink+'\')">'+
              '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 2h8M10 2v8M10 2L4 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'+
              'Open Card'+
            '</button>'+
          '</div>'+
          '<div class="progress-mini">'+
            '<div class="progress-mini-fill'+(approvedCount===total?' full':'')+'" style="width:'+progressWidth+'%"></div>'+
          '</div>'+
        '</div>';
    });

    document.getElementById('cardGrid').innerHTML = html;
  }

  async function doAction(cardId, shortLink, status, btn) {
    btn.disabled = true;
    btn.style.opacity = '0.5';
    try {
      var data = await t.get(cardId,'shared','approvalData');
      var reviews = (data && data.reviews) || {};
      reviews[currentMember.id] = { status: status, timestamp: Date.now() };
      data.reviews = reviews;
      await t.set(cardId,'shared','approvalData', data);

      // Update local data
      var item = allCards.find(function(c){ return c.card.id === cardId; });
      if (item) item.data = data;

      updateStats();
      renderCards();
    } catch(e) {
      alert('Error: '+e.message+' | Stack: '+(e.stack||'').slice(0,200));
      try { btn.disabled = false; btn.style.opacity = '1'; } catch(ex) {}
    }
  }

  function openCard(shortLink) {
    t.navigate({ url: 'https://trello.com/c/'+shortLink });
  }

  function toggleBulk() {
    var body = document.getElementById('bulkBody');
    var arrow = document.getElementById('bulkArrow');
    body.classList.toggle('open');
    arrow.textContent = body.classList.contains('open') ? '▲' : '▼';
  }

  function bulkLog(msg, type) {
    var log = document.getElementById('bulkLog');
    log.classList.add('open');
    var d = document.createElement('div');
    d.className = 'log-'+(type||'info');
    d.textContent = '['+new Date().toLocaleTimeString()+'] '+msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  }

  async function runBulk() {
    var raw = document.getElementById('bulkCsv').value.trim();
    if (!raw) { alert('Please enter CSV data'); return; }
    var rows = raw.split('\n').map(function(l){ return l.trim(); })
      .filter(function(l){ return l && !l.startsWith('#'); })
      .map(function(l){
        var p = l.split(',').map(function(x){ return x.trim(); });
        return { cardId: p[0], approverIds: p.slice(1).filter(Boolean) };
      });
    if (!rows.length) { alert('No valid rows'); return; }

    var btn = document.getElementById('runBtn');
    var bar = document.getElementById('progressBar');
    var fill = document.getElementById('progressFill');
    btn.disabled = true;
    bar.style.display = 'block';
    document.getElementById('bulkLog').innerHTML = '';

    bulkLog('Starting — '+rows.length+' card(s)', 'info');
    var ok=0, fail=0;

    for (var i=0; i<rows.length; i++) {
      var row = rows[i];
      fill.style.width = Math.round((i/rows.length)*100)+'%';
      try {
        await t.set(row.cardId,'shared','approvalData',{
          reviews:{}, idReviewers:row.approverIds, minimumApprovals:row.approverIds.length
        });
        bulkLog('✓ '+row.cardId, 'ok');
        ok++;
      } catch(e) {
        bulkLog('✗ '+row.cardId+': '+e.message, 'err');
        fail++;
      }
      await delay(150);
    }

    fill.style.width = '100%';
    bulkLog('Done — '+ok+' succeeded, '+fail+' failed', ok>0&&fail===0?'ok':'err');
    btn.disabled = false;
    await delay(1000);
    init();
  }

  init();
</script>
</body>
</html>
