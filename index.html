<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  var APP_KEY = 'd6dfdf9018fc698338d812f344d5c863';
  var BASE_URL = 'https://ahmedessam-test.github.io/trello-approvals-powerup';

  window.TrelloPowerUp.initialize({

    // ─── CARD BACK SECTION ───────────────────────────────────────────
    'card-back-section': function(t, options) {
      return {
        title: 'Approvals',
        icon: BASE_URL + '/icon.svg',
        content: {
          type: 'iframe',
          url: t.signUrl(BASE_URL + '/section.html'),
          height: 240
        }
      };
    },

    // ─── CARD BADGES (front of card) ─────────────────────────────────
    'card-badges': function(t, options) {
      return Promise.all([
        t.get('card', 'shared', 'approvalData'),
        t.member('id')
      ]).then(function(results) {
        var data = results[0];
        var member = results[1];
        if (!data || !data.idReviewers || data.idReviewers.length === 0) return [];

        var total = data.idReviewers.length;
        var reviews = data.reviews || {};
        var approvedCount = Object.values(reviews).filter(function(r) { return r.status === 'approved'; }).length;
        var declinedCount = Object.values(reviews).filter(function(r) { return r.status === 'declined'; }).length;

        var color, text;
        if (declinedCount > 0) {
          color = 'red'; text = 'Declined';
        } else if (approvedCount === total) {
          color = 'green'; text = 'Approved';
        } else {
          var myReview = reviews[member.id];
          var iAmReviewer = data.idReviewers.indexOf(member.id) !== -1;
          var iNeedToApprove = iAmReviewer && (!myReview || myReview.status === 'pending');
          if (iNeedToApprove) {
            color = 'yellow'; text = 'Pending your approval';
          } else {
            color = 'yellow'; text = 'Pending (' + approvedCount + '/' + total + ')';
          }
        }

        return [{ text: text, color: color }];
      }).catch(function() { return []; });
    },

    // ─── CARD DETAIL BADGES ──────────────────────────────────────────
    'card-detail-badges': function(t, options) {
      return Promise.all([
        t.get('card', 'shared', 'approvalData'),
        t.member('id')
      ]).then(function(results) {
        var data = results[0];
        var member = results[1];
        if (!data || !data.idReviewers || data.idReviewers.length === 0) return [];

        var total = data.idReviewers.length;
        var reviews = data.reviews || {};
        var approvedCount = Object.values(reviews).filter(function(r) { return r.status === 'approved'; }).length;
        var declinedCount = Object.values(reviews).filter(function(r) { return r.status === 'declined'; }).length;

        var color, text;
        if (declinedCount > 0) {
          color = 'red'; text = 'Declined';
        } else if (approvedCount === total) {
          color = 'green'; text = 'Approved ✓';
        } else {
          var myReview = reviews[member.id];
          var iAmReviewer = data.idReviewers.indexOf(member.id) !== -1;
          var iNeedToApprove = iAmReviewer && (!myReview || myReview.status === 'pending');
          if (iNeedToApprove) {
            color = 'yellow'; text = 'Pending your approval';
          } else {
            color = 'yellow'; text = 'Pending (' + approvedCount + '/' + total + ')';
          }
        }

        return [{ title: 'Approval Status', text: text, color: color }];
      }).catch(function() { return []; });
    },

    // ─── BOARD BUTTONS (dashboard) ───────────────────────────────────
    'board-buttons': function(t, options) {
      return [{
        text: 'Approvals Dashboard',
        icon: BASE_URL + '/icon.svg',
        callback: function(t) {
          return t.modal({
            url: t.signUrl(BASE_URL + '/dashboard.html'),
            title: 'Approvals Dashboard',
            fullscreen: true
          });
        }
      }];
    }

  }, {
    appKey: APP_KEY,
    appName: 'Change Approvals'
  });
</script>
</body>
</html>
