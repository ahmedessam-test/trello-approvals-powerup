<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
</head>
<body>
<script>
  // Initialize as a proper power-up iframe
  // This registers us with Trello and gets us a real t object
  var t = window.TrelloPowerUp.iframe({
    appKey: 'd6dfdf9018fc6b45b6e4b4e4b4e4b4e4', // your API key
    appName: 'Approvals Injector'
  });

  // Store t globally so the console can access it
  window.injectorT = t;

  // Signal to the parent page that we're ready
  window.parent.postMessage({ type: 'INJECTOR_READY', ready: true }, '*');

  console.log('Injector iframe loaded, t:', typeof t);
  console.log('t.set available:', typeof t.set);
</script>
</body>
</html>
