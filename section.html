<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    :root {
      --bg: #1d2125;
      --surface: #282e33;
      --surface2: #2c333a;
      --border: #3b4554;
      --text: #b6c2cf;
      --text-strong: #e8edf2;
      --text-muted: #7c8da3;
      --green: #4bce97;
      --green-dim: rgba(75,206,151,0.12);
      --red: #f87168;
      --red-dim: rgba(248,113,104,0.12);
      --yellow: #f5cd47;
      --yellow-dim: rgba(245,205,71,0.12);
      --blue: #579dff;
      --blue-dim: rgba(87,157,255,0.12);
      --radius: 6px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      padding: 4px 0 8px;
    }

    /* ── Approver rows ── */
    .approver-list { display: flex; flex-direction: column; gap: 2px; }

    .approver-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      transition: background 0.15s;
    }
    .approver-row:hover { background: var(--surface2); }

    /* Avatar */
    .av {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      position: relative;
      letter-spacing: 0.02em;
    }
    .av-ring {
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      border: 2px solid transparent;
    }
    .av-ring.approved { border-color: var(--green); }
    .av-ring.declined { border-color: var(--red); }

    .av-badge {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      font-weight: 800;
      color: #fff;
    }
    .av-badge.approved { background: var(--green); }
    .av-badge.declined { background: var(--red); }

    /* Info */
    .av-info { flex: 1; min-width: 0; }
    .av-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-strong);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .av-handle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* Action area */
    .av-action { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .pill.pending { background: var(--yellow-dim); color: var(--yellow); }
    .pill.approved { background: var(--green-dim); color: var(--green); }
    .pill.declined { background: var(--red-dim); color: var(--red); }

    .ts {
      font-size: 10px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* Action buttons */
    .btn-row { display: flex; gap: 4px; }

    .action-btn {
      padding: 5px 11px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .action-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }
    .action-btn:hover::after { background: rgba(255,255,255,0.08); }

    .btn-approve {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(75,206,151,0.25);
    }
    .btn-decline {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(248,113,104,0.25);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 10px;
      opacity: 0.5;
    }

    /* Summary */
    .summary {
      margin: 8px 10px 4px;
      padding: 10px 14px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      font-weight: 600;
    }
    .summary.pending { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(245,205,71,0.2); }
    .summary.approved { background: var(--green-dim); color: var(--green); border: 1px solid rgba(75,206,151,0.2); }
    .summary.declined { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,104,0.2); }

    .summary-icon { font-size: 16px; }
    .summary-text { flex: 1; }
    .summary-count { font-size: 18px; font-weight: 700; }

    /* Progress dots */
    .progress-dots { display: flex; gap: 4px; margin-left: auto; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }
    .dot.approved { background: var(--green); }
    .dot.declined { background: var(--red); }
    .dot.pending { background: rgba(255,255,255,0.15); }

    /* Footer actions */
    .footer {
      margin: 6px 10px 0;
      display: flex;
      gap: 6px;
    }

    .footer-btn {
      flex: 1;
      padding: 7px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .footer-btn:hover {
      background: var(--border);
      color: var(--text-strong);
      border-color: transparent;
    }
    .footer-btn.danger:hover { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,104,0.3); }

    /* Empty state */
    .empty {
      padding: 16px 12px;
      text-align: center;
    }
    .empty-icon {
      width: 40px;
      height: 40px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 18px;
    }
    .empty-title { font-size: 13px; font-weight: 600; color: var(--text-strong); margin-bottom: 4px; }
    .empty-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; }
    .empty-btn {
      padding: 7px 16px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .empty-btn:hover { opacity: 0.85; }

    .loading { padding: 16px 12px; color: var(--text-muted); font-size: 12px; }

    /* Spin animation */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
    }

    /* Fade in */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .approver-row { animation: fadeUp 0.2s ease both; }
    .approver-row:nth-child(1) { animation-delay: 0.03s; }
    .approver-row:nth-child(2) { animation-delay: 0.06s; }
    .approver-row:nth-child(3) { animation-delay: 0.09s; }
  </style>
</head>
<body>
<div id="root"><div class="loading"><span class="spinner"></span>Loading approvals…</div></div>

<script>
  var t = window.TrelloPowerUp.iframe({
    appKey: 'd6dfdf9018fc698338d812f344d5c863',
    appName: 'Change Approvals'
  });

  var COLORS = ['#0747a6','#006644','#ae2e24','#974f0c','#5e4db2','#026e8f','#206a83','#a54800'];
  var _data, _memberMap, _currentMember, _cardId;

  function initials(name) {
    return (name || '??').split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
  }
  function color(id) {
    var h=0; for(var i=0;i<id.length;i++) h=id.charCodeAt(i)+((h<<5)-h);
    return COLORS[Math.abs(h)%COLORS.length];
  }
  function fmtDate(ts) {
    if(!ts) return '';
    return new Date(ts).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'});
  }

  async function load() {
    try {
      var card = await t.card('id');
      _cardId = card.id;
      var board = await t.board('members');
      _memberMap = {};
      board.members.forEach(function(m){ _memberMap[m.id]=m; });
      _currentMember = await t.member('id','fullName','username');
      _data = await t.get('card','shared','approvalData');
      render();
    } catch(e) {
      document.getElementById('root').innerHTML = '<div class="loading">Error: '+e.message+'</div>';
    }
  }

  function render() {
    var root = document.getElementById('root');

    if (!_data || !_data.idReviewers || !_data.idReviewers.length) {
      root.innerHTML =
        '<div class="empty">'+
          '<div class="empty-icon">✦</div>'+
          '<div class="empty-title">No approvers assigned</div>'+
          '<div class="empty-sub">Set approvers to start the review process</div>'+
          '<button class="empty-btn" onclick="openSet(event)">+ Set Approvers</button>'+
        '</div>';
      t.sizeTo('#root'); return;
    }

    var reviews = _data.reviews || {};
    var total = _data.idReviewers.length;
    var approvedList = _data.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='approved'; });
    var declinedList = _data.idReviewers.filter(function(id){ return reviews[id] && reviews[id].status==='declined'; });
    var approvedCount = approvedList.length;
    var declinedCount = declinedList.length;
    var fullyApproved = approvedCount === total;
    var declined = declinedCount > 0;

    // Build rows
    var rowsHtml = '';
    _data.idReviewers.forEach(function(id) {
      var m = _memberMap[id] || {fullName:'Unknown',username:'unknown',id:id};
      var review = reviews[id] || {};
      var status = review.status || 'pending';
      var isMe = _currentMember.id === id;

      var badgeHtml = '';
      if (status==='approved') badgeHtml = '<div class="av-badge approved">✓</div>';
      if (status==='declined') badgeHtml = '<div class="av-badge declined">✕</div>';

      var ringClass = status !== 'pending' ? ' class="av-ring '+status+'"' : '';

      var actionHtml = '';
      if (isMe && status==='pending') {
        actionHtml = '<div class="btn-row">'+
          '<button class="action-btn btn-approve" onclick="doAction(\''+id+'\',\'approved\')">'+
            '<svg width="10" height="10" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
            'Approve'+
          '</button>'+
          '<button class="action-btn btn-decline" onclick="doAction(\''+id+'\',\'declined\')">'+
            '<svg width="10" height="10" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>'+
            'Decline'+
          '</button>'+
        '</div>';
      } else if (status==='approved') {
        actionHtml = '<span class="pill approved">'+
          '<svg width="9" height="9" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          'Approved</span>'+
          '<span class="ts">'+fmtDate(review.timestamp)+'</span>';
      } else if (status==='declined') {
        actionHtml = '<span class="pill declined">'+
          '<svg width="9" height="9" viewBox="0 0 12 12"><path d="M3 3l6 6M9 3l-6 6" stroke="currentColor" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg>'+
          'Declined</span>'+
          '<span class="ts">'+fmtDate(review.timestamp)+'</span>';
      } else {
        actionHtml = '<span class="pill pending">'+
          '<svg width="8" height="8" viewBox="0 0 12 12"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="2" fill="none"/></svg>'+
          'Pending</span>';
      }

      rowsHtml += '<div class="approver-row">'+
        '<div class="av" style="background:'+color(id)+'">'+
          initials(m.fullName)+
          '<div'+(status!=='pending'?' class="av-ring '+status+'"':' class="av-ring"')+'></div>'+
          badgeHtml+
        '</div>'+
        '<div class="av-info">'+
          '<div class="av-name">'+m.fullName+'</div>'+
          '<div class="av-handle">@'+m.username+'</div>'+
        '</div>'+
        '<div class="av-action">'+actionHtml+'</div>'+
      '</div>';
    });

    // Summary
    var summaryClass, summaryIcon, summaryText;
    var dotsHtml = _data.idReviewers.map(function(id){
      var s = reviews[id] ? reviews[id].status : 'pending';
      return '<div class="dot '+s+'"></div>';
    }).join('');

    if (declined) {
      summaryClass='declined'; summaryIcon='✕';
      summaryText = declinedCount+' approver'+(declinedCount>1?'s':'')+' declined';
    } else if (fullyApproved) {
      summaryClass='approved'; summaryIcon='✓';
      summaryText = 'Approved by all '+total+' approvers';
    } else {
      summaryClass='pending'; summaryIcon='◎';
      summaryText = approvedCount+' of '+total+' approved';
    }

    var html = '<div class="approver-list">'+rowsHtml+'</div>'+
      '<div class="divider"></div>'+
      '<div class="summary '+summaryClass+'">'+
        '<span class="summary-icon">'+summaryIcon+'</span>'+
        '<span class="summary-text">'+summaryText+'</span>'+
        '<div class="progress-dots">'+dotsHtml+'</div>'+
      '</div>'+
      '<div class="footer">'+
        '<button class="footer-btn" onclick="openSet(event)">'+
          '<svg width="12" height="12" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'+
          'Manage Approvers'+
        '</button>'+
      '</div>';

    root.innerHTML = html;
    t.sizeTo('#root');
  }

  async function doAction(memberId, status) {
    try {
      var data = _data;
      var reviews = data.reviews || {};
      reviews[memberId] = { status: status, timestamp: Date.now() };
      data.reviews = reviews;
      await t.set('card','shared','approvalData', data);
      _data = data;
      render();
    } catch(e) { alert('Error: '+e.message); }
  }

  async function openSet(e) {
    await t.popup({
      title: 'Manage Approvers',
      url: t.signUrl('https://ahmedessam-test.github.io/trello-approvals-powerup/set-approvers.html'),
      height: 420,
      mouseEvent: e
    });
    _data = await t.get('card','shared','approvalData');
    render();
  }

  // Bulk injection listener
  window.addEventListener('message', async function(e) {
    if (!e.data || e.data.type !== 'WRITE_APPROVAL') return;
    try {
      await t.set('card','shared','approvalData',{
        reviews:{},
        idReviewers: e.data.approverIds,
        minimumApprovals: e.data.minimumApprovals||3
      });
      window.parent.postMessage({type:'WRITE_RESULT',cardId:e.data.cardId,success:true},'*');
      _data = await t.get('card','shared','approvalData');
      render();
    } catch(err) {
      window.parent.postMessage({type:'WRITE_RESULT',cardId:e.data.cardId,success:false,error:err.message},'*');
    }
  });

  window.parent.postMessage({type:'INJECTOR_READY'},'*');
  load();
</script>
</body>
</html>
